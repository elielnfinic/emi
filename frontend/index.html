<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary ───────────────────────────────────────────────────── -->
    <title>EMI — Opérations Réussies</title>
    <meta name="description" content="Gérez vos ventes, stock, clients et finances en un seul endroit." />
    <meta name="author" content="EMI" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- ── Favicon & App Icon ────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── PWA Manifest ──────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Theme Color (matches body bg per color scheme) ───────────── -->
    <!-- These are updated dynamically by the theme store via JS -->
    <meta name="theme-color" id="theme-color-light" content="#F8F8FB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" id="theme-color-dark"  content="#09090B" media="(prefers-color-scheme: dark)" />

    <!-- ── Apple PWA ─────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EMI" />
    <!-- Splash screen color for iOS launch -->
    <meta name="msapplication-TileColor" content="#09090B" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn…) ───────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="EMI" />
    <meta property="og:locale"      content="fr_FR" />
    <meta property="og:url"         content="https://emi.souple.app" />
    <meta property="og:title"       content="EMI — Opérations Réussies" />
    <meta property="og:description" content="Gérez vos ventes, stock, clients et finances en un seul endroit." />
    <meta property="og:image"       content="https://emi.souple.app/logo-large.png" />
    <meta property="og:image:width"  content="800" />
    <meta property="og:image:height" content="600" />
    <meta property="og:image:alt"   content="EMI — tableau de bord de gestion commerciale" />

    <!-- ── Twitter / X Card ─────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="EMI — Opérations Réussies" />
    <meta name="twitter:description" content="Gérez vos ventes, stock, clients et finances en un seul endroit." />
    <meta name="twitter:image"       content="https://emi.souple.app/logo-large.png" />
    <meta name="twitter:image:alt"   content="EMI — tableau de bord de gestion commerciale" />

    <!-- ── Fonts ─────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
